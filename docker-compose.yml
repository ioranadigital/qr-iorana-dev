services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qr-iorana
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=${QR_IORANA_FRONTEND_PORT:-3010}
      - DB_PATH=/app/data/qr.db
      - ALLOWED_ORIGIN=https://qr.iorana.dev
    volumes:
      - qr-db-data:/app/data

volumes:
  qr-db-data:
    driver: local
